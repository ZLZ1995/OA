name: Sync local OA source

on:
  push:
    branches:
      - codex/sync-local-oa-main-action
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
      - name: Replace branch with local source package
        shell: bash
        env:
          SYNC_ZIP_URL: https://tmpfiles.org/dl/37509572/oa-local-sync.zip
        run: |
          set -euo pipefail
          curl -L "$SYNC_ZIP_URL" -o /tmp/oa-local-sync.zip
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          python - <<'PY'
          import zipfile
          with zipfile.ZipFile('/tmp/oa-local-sync.zip') as z:
              z.extractall('.')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync local OA implementation"
            git push origin HEAD:codex/sync-local-oa-main-action
          fi
